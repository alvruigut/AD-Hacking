services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ad_redteam
      POSTGRES_USER: ad_redteam
      POSTGRES_PASSWORD: ad_redteam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ad_redteam -d ad_redteam"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: AD Red Team Notes
      DATABASE_URL: postgresql+psycopg://ad_redteam:ad_redteam@postgres:5432/ad_redteam
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  postgres_data:
